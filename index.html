    <style>
      #root-loader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center; flex-direction: column;
        background: #070810;
        transition: opacity 0.5s ease, transform 0.5s ease;
        overflow: hidden;
      }
      #root-loader.hide { opacity: 0; pointer-events: none; transform: scale(1.02); }

      /* Ambient background glow */
      .rl-bg-glow {
        position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none;
      }
      .rl-bg-glow-1 {
        width: 400px; height: 400px; top: -10%; left: -5%;
        background: radial-gradient(circle, hsla(40,70%,50%,0.06), transparent 70%);
        animation: rl-float 8s ease-in-out infinite;
      }
      .rl-bg-glow-2 {
        width: 350px; height: 350px; bottom: -8%; right: -3%;
        background: radial-gradient(circle, hsla(40,60%,55%,0.04), transparent 70%);
        animation: rl-float 10s ease-in-out infinite reverse;
      }

      /* Logo container */
      .rl-logo-wrap {
        position: relative;
        animation: rl-logo-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
      }
      .rl-logo-glow {
        position: absolute; inset: -20px; border-radius: 28px;
        background: radial-gradient(circle, hsla(40,80%,55%,0.25), transparent 70%);
        filter: blur(20px); opacity: 0;
        animation: rl-glow-pulse 2.5s ease-in-out 0.6s infinite;
      }
      .rl-logo-ring {
        position: absolute; inset: -4px; border-radius: 22px;
        border: 1px solid transparent;
        background: linear-gradient(135deg, hsla(40,80%,60%,0.3), transparent, hsla(40,80%,60%,0.15)) border-box;
        -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor; mask-composite: exclude;
        animation: rl-ring-spin 4s linear infinite;
      }
      .rl-logo-img-wrap {
        position: relative;
        width: 80px; height: 80px; border-radius: 18px; overflow: hidden;
        background: linear-gradient(145deg, rgba(255,255,255,0.97), rgba(248,243,233,0.95));
        box-shadow: 0 20px 60px -12px rgba(198,167,94,0.25), 0 8px 24px -8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.6);
      }
      .rl-logo-img-wrap img {
        width: 100%; height: 100%; object-fit: contain; padding: 3px;
        animation: rl-logo-breathe 3s ease-in-out 1s infinite;
      }

      /* Title section */
      .rl-text {
        text-align: center; margin-top: 24px; position: relative; z-index: 1;
      }
      .rl-title {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 22px; font-weight: 700; margin: 0;
        background: linear-gradient(135deg, #F5E6C8, #C6A75E 40%, #E8D5A3 70%, #C6A75E);
        background-size: 200% auto;
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        opacity: 0; animation: rl-text-in 0.7s cubic-bezier(0.16,1,0.3,1) 0.25s forwards, rl-shimmer 4s linear 1.5s infinite;
      }
      .rl-subtitle {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 10px; color: rgba(198,167,94,0.4);
        letter-spacing: 0.3em; text-transform: uppercase; margin-top: 6px;
        opacity: 0; animation: rl-text-in 0.7s cubic-bezier(0.16,1,0.3,1) 0.45s forwards;
      }
      .rl-divider {
        width: 40px; height: 1px; margin: 12px auto 0;
        background: linear-gradient(90deg, transparent, rgba(198,167,94,0.3), transparent);
        opacity: 0; animation: rl-text-in 0.5s ease-out 0.6s forwards;
      }

      /* Progress bar */
      .rl-progress {
        width: 140px; height: 2px; border-radius: 99px; margin-top: 28px;
        background: rgba(255,255,255,0.04); overflow: hidden; position: relative;
        opacity: 0; animation: rl-text-in 0.5s ease-out 0.7s forwards;
      }
      .rl-progress-bar {
        height: 100%; border-radius: 99px; width: 0%;
        background: linear-gradient(90deg, hsl(40,75%,50%), hsl(38,85%,60%), hsl(40,75%,50%));
        background-size: 200% 100%;
        animation: rl-fill 2.5s cubic-bezier(0.4,0,0.2,1) 0.9s forwards, rl-bar-shimmer 1.5s linear infinite;
        box-shadow: 0 0 10px hsla(40,80%,55%,0.4);
      }

      /* Bottom branding */
      .rl-bottom {
        position: absolute; bottom: 24px;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase;
        color: rgba(255,255,255,0.06);
        opacity: 0; animation: rl-text-in 0.5s ease-out 1s forwards;
      }

      @keyframes rl-float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(20px, -15px) scale(1.1); }
      }
      @keyframes rl-logo-in {
        from { opacity: 0; transform: scale(0.5) translateY(20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes rl-logo-breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }
      @keyframes rl-glow-pulse {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
      }
      @keyframes rl-ring-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes rl-text-in {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes rl-shimmer {
        to { background-position: 200% center; }
      }
      @keyframes rl-fill { to { width: 100%; } }
      @keyframes rl-bar-shimmer {
        from { background-position: 0% 0; }
        to { background-position: 200% 0; }
      }
    </style>
